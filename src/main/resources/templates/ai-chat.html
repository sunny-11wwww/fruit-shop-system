<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>水果商品溯源管理系统 - AI水果问答</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f7fa; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }
        .navbar { margin-bottom: 0; border-radius: 0; }
        .navbar-inverse { background-color: #337ab7; border-color: #2e6da4; }
        .navbar-inverse .navbar-brand { color: #fff; font-size: 18px; font-weight: bold; }
        .navbar-inverse .navbar-nav>li>a { color: #fff; }
        .navbar-inverse .navbar-nav>li>a:hover { background-color: #286090; }
        .content-area { padding: 20px; margin-top: 60px; }
        .page-header { margin-top: 0; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .page-header h1 { font-size: 24px; color: #333; }
        .panel { border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .panel-heading { background-color: #337ab7 !important; color: #fff !important; border-radius: 8px 8px 0 0 !important; }
        .panel-title { font-size: 16px; font-weight: bold; }
        .chat-container { height: 500px; overflow-y: auto; padding: 20px; background-color: #fff; }
        .message { margin-bottom: 20px; }
        .user-message { text-align: right; }
        .user-bubble { background-color: #337ab7; color: #fff; padding: 12px 16px; border-radius: 16px; display: inline-block; max-width: 70%; text-align: left; }
        .ai-message { text-align: left; }
        .ai-bubble { background-color: #f0f0f0; color: #333; padding: 12px 16px; border-radius: 16px; display: inline-block; max-width: 70%; }
        .ai-icon { font-size: 24px; margin-right: 10px; }
        .input-area { padding: 15px; background-color: #f8f9fa; border-top: 1px solid #eee; }
        .input-group { margin-bottom: 0; }
        .form-control { border-radius: 20px; }
        .btn-send { border-radius: 20px; background-color: #337ab7; border-color: #2e6da4; }
        .btn-send:hover { background-color: #286090; }
        .avatar { width: 30px; height: 30px; border-radius: 50%; background-color: #337ab7; color: #fff; text-align: center; line-height: 30px; display: inline-block; margin-right: 8px; }
        .clear-btn { float: right; margin-top: 5px; }
        .loading { color: #337ab7; font-style: italic; }
    </style>
</head>
<body>
    <nav class="navbar navbar-inverse navbar-fixed-top">
        <div class="container">
            <div class="navbar-header">
                <a class="navbar-brand" href="/index">🍎 水果商品溯源管理系统</a>
            </div>
            <div class="collapse navbar-collapse">
                <ul class="nav navbar-nav">
                    <li><a href="/index">管理首页</a></li>
                    <li><a href="/fruit/manage">水果商品管理</a></li>
                    <li><a href="/stats/stock">库存数据统计</a></li>
                    <li class="active"><a href="/fruit/ai">AI水果问答</a></li>
                </ul>
                <ul class="nav navbar-nav navbar-right">
                    <li class="dropdown">
                        <a href="#" class="dropdown-toggle" data-toggle="dropdown">
                            <span class="avatar" th:text="${username.charAt(0)}"></span>
                            <span th:text="${username}"></span>
                            <span class="caret"></span>
                        </a>
                        <ul class="dropdown-menu">
                            <li><a href="/logout">退出登录</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container content-area">
        <div class="page-header">
            <h1>AI水果知识库问答</h1>
            <a href="/fruit/ai/clear" class="btn btn-default btn-xs clear-btn">清空对话</a>
        </div>

        <div class="panel panel-default">
            <div class="panel-heading">
                <span class="panel-title">🤖 AI智能助手</span>
            </div>
            <div class="panel-body" style="padding: 0;">
                <div class="chat-container" id="chatContainer">
                    <div class="message ai-message">
                        <span class="ai-icon">🤖</span>
                        <span class="ai-bubble">你好！我是水果知识库助手，可以为您解答关于水果产地、成熟时间、储存方法、保鲜时长、食用注意事项等问题。请问有什么可以帮您的？</span>
                    </div>
                    <div th:each="msg : ${chatHistory}">
                        <div th:class="${msg.role == 'user' ? 'message user-message' : 'message ai-message'}">
                            <span th:if="${msg.role == 'user'}" class="user-bubble" th:text="${msg.content}"></span>
                            <span th:if="${msg.role == 'ai'}" class="ai-bubble" th:text="${msg.content}"></span>
                        </div>
                    </div>
                    <div id="loadingIndicator" style="display: none;" class="message ai-message">
                        <span class="ai-bubble loading">正在思考中...</span>
                    </div>
                </div>
                <div class="input-area">
                    <div class="input-group">
                        <input type="text" class="form-control" id="questionInput" placeholder="请输入您的问题，例如：苹果的产地是哪里？" onkeypress="if(event.keyCode==13)sendMessage()">
                        <span class="input-group-btn">
                            <button class="btn btn-primary btn-send" onclick="sendMessage()">发送</button>
                        </span>
                    </div>
                    <div style="margin-top: 10px; font-size: 12px; color: #999;">
                        支持提问：水果产地、成熟月份、采摘运输周期、常温/冷藏储存方案、保鲜时长、最佳食用期限、食用宜忌
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@1.12.4/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/js/bootstrap.min.js"></script>
    <script>
        function sendMessage() {
            var question = $('#questionInput').val().trim();
            if (!question) return;

            $('#chatContainer').append('<div class="message user-message"><span class="user-bubble">' + question + '</span></div>');
            $('#questionInput').val('');
            $('#loadingIndicator').show();
            $('#chatContainer').scrollTop($('#chatContainer')[0].scrollHeight);

            $.ajax({
                url: '/fruit/ai/ask',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ question: question }),
                success: function(response) {
                    $('#loadingIndicator').hide();
                    $('#chatContainer').append('<div class="message ai-message"><span class="ai-bubble">' + response.answer + '</span></div>');
                    $('#chatContainer').scrollTop($('#chatContainer')[0].scrollHeight);
                },
                error: function() {
                    $('#loadingIndicator').hide();
                    $('#chatContainer').append('<div class="message ai-message"><span class="ai-bubble">抱歉，系统出现问题，请稍后再试。</span></div>');
                }
            });
        }
    </script>
</body>
</html>
