<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>水果商品溯源管理系统 - 库存数据统计</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f7fa; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }
        .navbar { margin-bottom: 0; border-radius: 0; }
        .navbar-inverse { background-color: #337ab7; border-color: #2e6da4; }
        .navbar-inverse .navbar-brand { color: #fff; font-size: 18px; font-weight: bold; }
        .navbar-inverse .navbar-nav>li>a { color: #fff; }
        .navbar-inverse .navbar-nav>li>a:hover { background-color: #286090; }
        .content-area { padding: 20px; margin-top: 60px; }
        .page-header { margin-top: 0; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .page-header h1 { font-size: 24px; color: #333; }
        .stat-card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 25px; text-align: center; margin-bottom: 20px; }
        .stat-icon { font-size: 40px; margin-bottom: 15px; }
        .stat-number { font-size: 36px; font-weight: bold; color: #333; }
        .stat-label { font-size: 14px; color: #666; margin-top: 5px; }
        .panel { border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .panel-heading { background-color: #fff !important; border-bottom: 1px solid #eee; padding: 15px 20px; border-radius: 8px 8px 0 0 !important; }
        .panel-title { font-size: 16px; font-weight: bold; color: #333; }
        .table { margin-bottom: 0; }
        .table th { background-color: #f8f9fa; border-bottom: 2px solid #dee2e6; }
        .table td { vertical-align: middle; }
        .low-stock { color: #d9534f; font-weight: bold; }
        .pagination { margin: 15px 0; }
        .avatar { width: 30px; height: 30px; border-radius: 50%; background-color: #337ab7; color: #fff; text-align: center; line-height: 30px; display: inline-block; margin-right: 8px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-inverse navbar-fixed-top">
        <div class="container">
            <div class="navbar-header">
                <a class="navbar-brand" href="/index">🍎 水果商品溯源管理系统</a>
            </div>
            <div class="collapse navbar-collapse">
                <ul class="nav navbar-nav">
                    <li><a href="/index">管理首页</a></li>
                    <li><a href="/fruit/manage">水果商品管理</a></li>
                    <li class="active"><a href="/stats/stock">库存数据统计</a></li>
                    <li><a href="/fruit/ai">AI水果问答</a></li>
                </ul>
                <ul class="nav navbar-nav navbar-right">
                    <li class="dropdown">
                        <a href="#" class="dropdown-toggle" data-toggle="dropdown">
                            <span class="avatar" th:text="${username.charAt(0)}"></span>
                            <span th:text="${username}"></span>
                            <span class="caret"></span>
                        </a>
                        <ul class="dropdown-menu">
                            <li><a href="/logout">退出登录</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container content-area">
        <div class="page-header">
            <h1>库存数据统计</h1>
        </div>

        <div class="row">
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-icon">🍇</div>
                    <div class="stat-number" th:text="${totalFruits}"></div>
                    <div class="stat-label">商品品类数</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-icon">📦</div>
                    <div class="stat-number" th:text="${totalStock}"></div>
                    <div class="stat-label">总库存数量</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-icon">⚠️</div>
                    <div class="stat-number low-stock" th:text="${lowStockCount}"></div>
                    <div class="stat-label">低库存商品数</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-number" th:text="${avgStock}"></div>
                    <div class="stat-label">平均库存量</div>
                </div>
            </div>
        </div>

        <div class="panel panel-default">
            <div class="panel-heading">
                <span class="panel-title">低库存预警商品列表（库存≤30）</span>
            </div>
            <div class="panel-body">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>水果名称</th>
                            <th>单价</th>
                            <th>当前库存</th>
                            <th>产地</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="fruit : ${lowStockPage.records}">
                            <td th:text="${fruit.id}"></td>
                            <td th:text="${fruit.fruitName}"></td>
                            <td th:text="'¥' + ${fruit.price}"></td>
                            <td class="low-stock" th:text="${fruit.stock}"></td>
                            <td th:text="${fruit.origin}"></td>
                            <td><span class="label label-danger">低库存</span></td>
                            <td>
                                <a href="/fruit/manage" class="btn btn-xs btn-primary">补货管理</a>
                            </td>
                        </tr>
                        <tr th:if="${lowStockPage.records == null or lowStockPage.records.isEmpty()}">
                            <td colspan="7" class="text-center">暂无低库存商品</td>
                        </tr>
                    </tbody>
                </table>

                <nav>
                    <ul class="pagination">
                        <li th:class="${currentPage == 1 ? 'disabled' : ''}">
                            <a th:href="@{/stats/stock(pageNum=${currentPage-1})}">上一页</a>
                        </li>
                        <li th:each="page : ${#numbers.sequence(1, totalPages)}" th:class="${page == currentPage ? 'active' : ''}">
                            <a th:href="@{/stats/stock(pageNum=${page})}" th:text="${page}"></a>
                        </li>
                        <li th:class="${currentPage == totalPages ? 'disabled' : ''}">
                            <a th:href="@{/stats/stock(pageNum=${currentPage+1})}">下一页</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@1.12.4/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/js/bootstrap.min.js"></script>
</body>
</html>
