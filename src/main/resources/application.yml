server:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  error:
    include-stacktrace: always
    include-message: always
    include-binding-errors: always
    whitelabel:
      enabled: false

spring:
  datasource:
    url: jdbc:h2:mem:fruitdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: root
    password: 123456
  h2:
    console:
      enabled: false
  sql.init:
    mode: always
    schema-locations: classpath:schema.sql
    encoding: UTF-8
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML5
    encoding: UTF-8
    cache: false

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.shop.aifruit.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      ddl-auto: none

logging:
  level:
    root: INFO
    com.shop.aifruit: DEBUG
    org.springframework: DEBUG
    org.springframework.web: DEBUG
    org.mybatis: DEBUG
    com.baomidou.mybatisplus: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"